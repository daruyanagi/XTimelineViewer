name: Publish to Microsoft Store

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"          # v1.2.0 → 1.2.0.0
          $ver = $tag.TrimStart('v') + '.0'
          echo "MSIX_VERSION=$ver" >> $env:GITHUB_ENV

      - name: Update manifest version
        shell: pwsh
        run: |
          $manifest = "Package.appxmanifest"
          (Get-Content $manifest) -replace 'Version="\d+\.\d+\.\d+\.\d+"', "Version=""$env:MSIX_VERSION""" |
            Set-Content $manifest

      - name: Restore packages
        run: dotnet restore XTimelineViewer.csproj

      - name: Fix System.Security.Permissions for Windows App SDK build tasks
        shell: pwsh
        run: |
          $pkg = (dotnet nuget locals global-packages --list) -replace "global-packages:\s*", "" |
                 Where-Object { $_ -ne "" } | Select-Object -First 1
          $ssp = "$pkg\system.security.permissions\8.0.0\lib\net8.0\System.Security.Permissions.dll"
          if (-not (Test-Path $ssp)) { Write-Error "Not found: $ssp"; exit 1 }
          $count = 0
          Get-ChildItem "$pkg\microsoft.windowsappsdk" -Recurse -Filter "Microsoft.Build.Msix.dll" |
            ForEach-Object { Copy-Item $ssp $_.DirectoryName -Force; $script:count++ }
          if ($count -eq 0) { Write-Error "Microsoft.Build.Msix.dll not found"; exit 1 }
          Write-Host "Copied to $count location(s)"

      - name: Create self-signed certificate for packaging
        shell: pwsh
        run: |
          $thumb = (New-SelfSignedCertificate `
              -Type CodeSigningCert `
              -Subject "CN=B73FDB0C-06E5-4824-9E7F-3AF969921DF4" `
              -KeyUsage "DigitalSignature" `
              -CertStoreLocation "Cert:\CurrentUser\My" `
              -NotAfter (Get-Date).AddYears(1)
          ).Thumbprint
          echo "CERT_THUMBPRINT=$thumb" >> $env:GITHUB_ENV
          Write-Host "Certificate thumbprint: $thumb"

      - name: Build x64
        shell: pwsh
        run: |
          dotnet publish XTimelineViewer.csproj `
            -c Release -r win-x64 -p:Platform=x64 `
            -p:AppxPackageDir=.\AppPackages\x64\ `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxBundle=Never `
            "-p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT"

      - name: Build arm64
        shell: pwsh
        run: |
          dotnet publish XTimelineViewer.csproj `
            -c Release -r win-arm64 -p:Platform=arm64 -p:PlatformTarget=arm64 `
            -p:AppxPackageDir=.\AppPackages\arm64\ `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxBundle=Never `
            "-p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT"

      - name: Collect MSIX files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\upload
          Get-ChildItem -Recurse -Filter "*.msix" .\AppPackages | ForEach-Object {
            Copy-Item $_.FullName .\upload\
          }
          Write-Host "Packages to upload:"
          Get-ChildItem .\upload
          Compress-Archive -Path .\upload\*.msix -DestinationPath .\upload\XTimelineViewer.msixupload

      - name: Setup Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Configure msstore-cli
        run: >
          msstore reconfigure
          --tenantId "${{ secrets.AZURE_TENANT_ID }}"
          --clientId "${{ secrets.AZURE_CLIENT_ID }}"
          --clientSecret "${{ secrets.AZURE_CLIENT_SECRET }}"
          --sellerId "${{ secrets.PARTNER_CENTER_SELLER_ID }}"

      - name: Delete any pending submission
        run: msstore submission delete "9P308HB5BLJ1" --no-confirm
        continue-on-error: true

      - name: Publish to Microsoft Store
        run: msstore publish -i .\upload -id "9P308HB5BLJ1"
